services:
  db:
    image: postgres:latest
    container_name: todo-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - my-todo-app-volume:/var/lib/postgresql
    networks:
      - todo-net
    ports:
      - "5433:5432"

  app:
    build: .
    container_name: todo-app
    env_file:
      - .env
    ports:
      - "8080:8080"
    networks:
      - todo-net
    depends_on:
      - db

volumes:
  my-todo-app-volume:

networks:
  todo-net:
    driver: bridge